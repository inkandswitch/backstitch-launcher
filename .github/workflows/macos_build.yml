name: 🍎 Build for macOS
on:
  workflow_call:

jobs:
  build:
    runs-on: "macos-latest"
    name: 🔨 Build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore Cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "backstitch-launcher-macos-build"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        run: |
          rustup target add x86_64-apple-darwin
          rustup target add aarch64-apple-darwin

      - name: Install cargo-bundle
        run: cargo install cargo-bundle

      - name: Build macOS universal binary
        run: |
          cargo build --release --target x86_64-apple-darwin
          cargo build --release --target aarch64-apple-darwin

          mkdir -p target/universal/release

          lipo -create \
            target/x86_64-apple-darwin/release/backstitch-launcher \
            target/aarch64-apple-darwin/release/backstitch-launcher \
            -output target/universal/release/backstitch-launcher

      - name: Bundle macOS app
        shell: bash
        run: |
          set -euo pipefail
          cargo bundle --release --format osx
          BUNDLE_APP="$(find target/release/bundle/osx -maxdepth 1 -name "*.app" | head -n1)"
          test -n "$BUNDLE_APP"
          cp -f target/universal/release/backstitch-launcher \
            "$BUNDLE_APP/Contents/MacOS/backstitch-launcher"
          chmod +x "$BUNDLE_APP/Contents/MacOS/backstitch-launcher"
          mkdir -p artifacts
          rm -rf artifacts/backstitch-launcher-macos.app
          cp -R "$BUNDLE_APP" artifacts/backstitch-launcher-macos.app

      - name: Mac Sign
        uses: ./.github/actions/macos-sign
        with:
          FRAMEWORK_PATH: ${{ github.workspace }}/artifacts/backstitch-launcher-macos.app
          SIGN_FLAGS: "--deep --options runtime"
          APPLE_CERT_BASE64: ${{ secrets.APPLE_CERT_BASE64 }}
          APPLE_CERT_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
          APPLE_DEV_PASSWORD: ${{ secrets.APPLE_DEV_PASSWORD }}
          APPLE_DEV_ID: ${{ secrets.APPLE_DEV_ID }}
          APPLE_DEV_TEAM_ID: ${{ secrets.APPLE_DEV_TEAM_ID }}
          APPLE_DEV_APP_ID: ${{ secrets.APPLE_DEV_APP_ID }}
          BUNDLE_IDENTIFIER_OVERRIDE: "com.inkandswitch.backstitch-launcher"
            

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: backstitch-launcher-macos
          path: artifacts/backstitch-launcher-macos.app
