name: 🪟 Build for Windows

on:
  workflow_call:

jobs:
  build:
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build
        run: cargo build --release

      # TODO: need secrets
      # - name: Windows Sign
      #   uses: ./.github/actions/windows-sign
      #   with:
      #     BINARY_PATHS: |
      #       target/release/backstitch-launcher.exe
      #     KMS_CREDENTIALS_JSON: ${{ secrets.GCLOUD_SERVICE_ACCOUNT_KEY }}
      #     KMS_PUBLIC_CERT: ${{ secrets.CODESIGN_PUBLIC_CERT }}
      #     KMS_PROJECT: ${{ secrets.KMS_PROJECT }}
      #     KMS_LOCATION: ${{ secrets.KMS_LOCATION }}
      #     KMS_KEYRING: ${{ secrets.KMS_KEYRING }}
      #     KMS_KEY: ${{ secrets.KMS_KEY }}
            
      - name: Collect executables
        shell: bash
        run: |
          mkdir -p artifacts
          cp target/release/backstitch-launcher.exe artifacts/backstitch-launcher.windows.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          path: artifacts/*
