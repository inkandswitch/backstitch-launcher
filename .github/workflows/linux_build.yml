name: 🐧 Build for Linux

on:
  workflow_call:

jobs:
  build:
    runs-on: ubuntu-latest
    name: 🔨 Build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Restore Cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "backstitch-launcher-linux-build"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y musl-tools

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Collect executables
        shell: bash
        run: |
          ls -l target/release
          mkdir -p artifacts
          cp target/x86_64-unknown-linux-musl/release/backstitch-launcher artifacts/backstitch-launcher-linux

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: backstitch-launcher-linux
          path: artifacts/backstitch-launcher-linux
