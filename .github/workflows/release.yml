name: 📦 Release
on: 
  workflow_call:

jobs:
  release:
    name: ✉️ Release composite zip
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: ${{ github.workspace }}

      - name: Set permissions for Linux and macOS executables
        shell: bash
        run: |
          chmod +x backstitch-launcher-linux || true
          MAC_BIN="backstitch-launcher-macos.app/Contents/MacOS/backstitch-launcher"
          if [ -f "$MAC_BIN" ]; then chmod +x "$MAC_BIN"; fi

      - name: Create single zip of all artifacts
        run: |
          zip -ry backstitch-launcher-${{ github.ref_name }}.zip backstitch-launcher-windows.exe backstitch-launcher-linux backstitch-launcher-macos.app .gitignore.template

      - name: Release zip artifact
        uses: softprops/action-gh-release@v2
        with:
          files: backstitch-launcher-${{ github.ref_name }}.zip